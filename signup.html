<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - GLOSPOT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo-container">
    <img src="images/glospot-logo.png" alt="GLOSPOT Logo" class="logo">
    <h1>GLOSPOT</h1>
  </a>
  <div class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
  <nav id="main-nav">
    <a href="index.html">Home</a>
    <a href="hotels.html">Hotels</a>
    <a href="guides.html">Guides</a>
    <a href="transportation.html">Transportation</a>
    <a href="signup.html" class="active" id="signup-link">Sign Up</a>
    <a href="signin.html" id="signin-link">Sign In</a>
    <button id="logout-btn" style="display:none;">Log Out</button>
  </nav>
</header>

<div id="auth-message"></div>

<div class="auth-page">
  <section class="form-section">
    <h2>Create Account</h2>
    <p class="form-tagline">Join GLOSPOT and start your adventure</p>
    <form id="signup-form">
      <label for="su-name">Full Name</label>
      <input type="text" id="su-name" placeholder="Your full name" required>

      <label for="su-email">Email</label>
      <input type="email" id="su-email" placeholder="you@example.com" required>

      <label for="su-password">Password</label>
      <input type="password" id="su-password" placeholder="At least 6 characters" required>

      <button type="submit">Sign Up</button>
    </form>
    <div class="form-links">
      <p>Already have an account? <a href="signin.html">Sign In</a></p>
    </div>
  </section>
</div>

<footer>
  <div class="footer-bottom" style="border-top:none;">
    <p>&copy; 2025 GLOSPOT. All rights reserved.</p>
  </div>
</footer>

<script>
function toggleMenu() {
  document.getElementById('main-nav').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}
</script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
